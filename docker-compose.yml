services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: chocolate_sqlserver
    environment:
      SA_PASSWORD: "Sxxxxxxxx"
      ACCEPT_EULA: "Y"
    ports:
      - 1433:1433
    volumes:
      - sqlserver_data:/var/opt/mssql
  redis:
    image: redis:7-alpine
    container_name: chocolate_redis
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
volumes:
  sqlserver_data:
  redis_data:
